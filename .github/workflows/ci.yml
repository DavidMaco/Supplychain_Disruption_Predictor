# GitHub Actions CI for Supply Chain Disruption Predictor
# Runs tests and linting on push / PR

name: CI

on:
  push:
    paths:
      - "Supply Chain Disruption Predictor/**"
  pull_request:
    paths:
      - "Supply Chain Disruption Predictor/**"

defaults:
  run:
    working-directory: "Supply Chain Disruption Predictor"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Lint (basic)
        run: |
          pip install flake8
          flake8 *.py --max-line-length=120 --count --statistics --ignore=E501,W503,W504
